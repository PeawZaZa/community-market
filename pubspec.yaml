name: community_market
description: ตลาดชุมชน - แอปซื้อขายสินค้าในชุมชนท้องถิ่น
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State management
  provider: ^6.1.1
  # Local database
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.3
  path: ^1.8.3
  # Image picker
  image_picker: ^1.0.7
  # Shared preferences
  shared_preferences: ^2.2.2
  # UUID generator
  uuid: ^4.3.3
  # Intl for date/number formatting
  intl: ^0.19.0
  # Cached network image
  cached_network_image: ^3.3.1
  # Google fonts
  google_fonts: ^6.2.1
  # Flutter SVG
  flutter_svg: ^2.0.10+1
  # Shimmer loading
  shimmer: ^3.0.0
  # Badges
  badges: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Sarabun
      fonts:
        - asset: assets/fonts/Sarabun-Regular.ttf
        - asset: assets/fonts/Sarabun-Medium.ttf
          weight: 500
        - asset: assets/fonts/Sarabun-Bold.ttf
          weight: 700
